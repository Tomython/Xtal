<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtal Player</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #050505; color: white; }
        #player { background: #111; padding: 25px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #222; }
        .yt-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; outline: none; }
        button { background: #1db954; border: none; color: white; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1ed760; }
        #cover { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin: 15px 0; background: #222; }
        input[type="range"] { width: 100%; margin: 10px 0; accent-color: #1db954; }
        #title { font-size: 14px; margin-bottom: 10px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .time { font-size: 12px; color: #666; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="player">
        <div class="yt-box">
            <input type="text" id="ytUrl" placeholder="Вставь ссылку на YouTube...">
            <button id="ytGo">GO</button>
        </div>

        <input type="file" id="fileIn" accept="audio/*" style="font-size: 12px;">
        
        <img id="cover" src="placeholder.jpg">
        <div id="title">Ready to play</div>

        <audio id="audio" crossorigin="anonymous"></audio>

        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button id="playBtn" style="min-width: 80px;">Play</button>
            <div class="time" id="timeDisplay">00:00 / 00:00</div>
        </div>

        <input type="range" id="seek" value="0" step="0.1">
        
        <label style="font-size: 13px; display: block; margin-top: 10px;">
            Speed: <span id="spNum">1.00</span>x
            <input type="range" id="speed" min="0.5" max="2.0" step="0.05" value="1">
        </label>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const seek = document.getElementById('seek');
        const speed = document.getElementById('speed');
        const spNum = document.getElementById('spNum');
        const ytGo = document.getElementById('ytGo');
        const ytUrl = document.getElementById('ytUrl');

        // YouTube Логика
        ytGo.onclick = () => {
            if(!ytUrl.value) return;
            ytGo.textContent = "...";
            
            // Прямая установка src без лишних fetch запросов
            const streamPath = `/stream-yt?url=${encodeURIComponent(ytUrl.value)}`;
            
            audio.pause();
            audio.src = streamPath;
            audio.load();
            
            audio.play().then(() => {
                document.getElementById('title').textContent = "YouTube Stream Active";
                ytGo.textContent = "GO";
            }).catch(err => {
                console.error(err);
                alert("Ошибка! Открой через http://localhost:2025");
                ytGo.textContent = "GO";
            });
        };

        // Файл Логика
        document.getElementById('fileIn').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                audio.src = URL.createObjectURL(file);
                audio.play();
                document.getElementById('title').textContent = file.name;
            }
        };

        // Управление
        playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
        audio.onplay = () => playBtn.textContent = 'Pause';
        audio.onpause = () => playBtn.textContent = 'Play';
        
        audio.ontimeupdate = () => {
            if(!isNaN(audio.duration)) {
                seek.max = audio.duration;
                seek.value = audio.currentTime;
                const fmt = (s) => new Date(s * 1000).toISOString().substr(14, 5);
                document.getElementById('timeDisplay').textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
            }
        };

        seek.oninput = () => audio.currentTime = seek.value;
        speed.oninput = () => {
            audio.playbackRate = speed.value;
            spNum.textContent = parseFloat(speed.value).toFixed(2);
        };
    </script>
</body>
</html>
