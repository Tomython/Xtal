<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtal Player</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #000; color: #fff; }
        #player-card { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #333; color: #fff; }
        button { background: #4CAF50; border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #coverArt { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin: 10px 0; background: #222; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        #trackTitle { margin: 10px 0; font-weight: bold; font-size: 14px; color: #ccc; }
    </style>
</head>
<body>

    <div id="player-card">
        <div class="input-group">
            <input type="text" id="ytUrl" placeholder="Вставь ссылку на YouTube">
            <button id="loadYtBtn">GO</button>
        </div>

        <input type="file" id="fileInput" accept="audio/*" style="font-size: 12px; margin-bottom: 10px;">
        
        <img id="coverArt" src="placeholder.jpg">
        <div id="trackTitle">Xtal Player</div>

        <audio id="mainAudio" crossorigin="anonymous"></audio>

        <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <button id="playBtn" style="width: 70px;">Play</button>
            <div id="time">00:00 / 00:00</div>
        </div>

        <input type="range" id="seekBar" value="0" step="0.1">
        
        <label style="font-size: 13px;">Speed: <span id="spTxt">1.00</span>x
            <input type="range" id="speedCtrl" min="0.5" max="2.0" step="0.05" value="1">
        </label>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');
        const seekBar = document.getElementById('seekBar');
        const speedCtrl = document.getElementById('speedCtrl');
        const trackTitle = document.getElementById('trackTitle');
        const ytBtn = document.getElementById('loadYtBtn');

        // Генерируем правильный путь к серверу
        const getServerUrl = (path) => {
            const host = window.location.origin.includes('file://') ? 'http://localhost:2025' : '';
            return `${host}${path}`;
        };

        // Загрузка YouTube
        ytBtn.onclick = () => {
            const url = document.getElementById('ytUrl').value;
            if(!url) return;
            ytBtn.textContent = "...";
            audio.src = getServerUrl(`/stream-yt?url=${encodeURIComponent(url)}`);
            audio.load();
            audio.play().then(() => {
                trackTitle.textContent = "YouTube Stream";
                ytBtn.textContent = "GO";
            }).catch(e => {
                alert("Ошибка! Открой сайт через http://localhost:2025");
                ytBtn.textContent = "GO";
            });
        };

        // Локальный файл
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            audio.src = URL.createObjectURL(file);
            audio.play();
            trackTitle.textContent = file.name;
        };

        // Управление
        playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
        audio.onplay = () => playBtn.textContent = 'Pause';
        audio.onpause = () => playBtn.textContent = 'Play';
        
        audio.ontimeupdate = () => {
            if(!isNaN(audio.duration)) {
                seekBar.max = audio.duration;
                seekBar.value = audio.currentTime;
                const fmt = (s) => new Date(s * 1000).toISOString().substr(14, 5);
                document.getElementById('time').textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
            }
        };

        seekBar.oninput = () => audio.currentTime = seekBar.value;
        speedCtrl.oninput = () => {
            audio.playbackRate = speedCtrl.value;
            document.getElementById('spTxt').textContent = parseFloat(speedCtrl.value).toFixed(2);
        };
    </script>
</body>
</html>
